<!DOCTYPE html>
<html lang="de">

<head>

            <button id="alteStadtButton">Meine alte Stadt</button>

        <main class="content">

            <h2>Willkommen!</h2>

            <p>
                Willkommen auf meiner persönlichen Webseite.
            </p>

                Wähle links einen Bereich aus.

    <script src="script.js"></script>

</html>
